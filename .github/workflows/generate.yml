name: generate-quizzes

# Single source of truth for cdn/v3/quizzes.json. It generates from BOTH the
# golang/proposal design docs (cloned directly from upstream) and the golang/go
# proposal issues in ONE run, merges them, and commits in-repo. Do NOT add a
# second workflow (here or in any fork) that also writes cdn/v3/quizzes.json —
# concurrent writers would race and clobber each other. The `concurrency` group
# below also prevents this workflow from racing with itself.

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: generate-quizzes
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # One GitHub App token is used for everything: it is passed to checkout so
      # the persisted push credentials are the app's (commits land as
      # fummicc1-app[bot]), and reused for the GraphQL issue search (installation
      # tokens can read public repos like golang/go). It must be minted before
      # checkout so checkout persists it instead of the default GITHUB_TOKEN.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: fummicc1
          repositories: go-masked-quiz

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: quizgen/go.mod

      - name: Clone golang/proposal (design-docs source)
        run: git clone --depth 1 https://github.com/golang/proposal third_party/golang-proposal

      - name: Generate merged quizzes (design docs + golang/go issues)
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd quizgen
          go run ./cmd/quizgen generate \
            --source        design-docs,github-issues \
            --proposals     ../third_party/golang-proposal/design \
            --commit        "$(git -C ../third_party/golang-proposal rev-parse HEAD)" \
            --max-proposals 200 \
            --out           "${RUNNER_TEMP}/quizzes.new.json" \
            --seed          42

      - name: Commit on substantive change (ignoring generated_at)
        run: |
          NEW="${RUNNER_TEMP}/quizzes.new.json"
          CUR=cdn/v3/quizzes.json
          # Compare everything except generated_at, via temp files so neither jq
          # gets a broken pipe. Any jq failure falls through to a commit (the
          # safe default: publish rather than silently skip).
          norm() { jq -S 'del(.generated_at)' "$1"; }
          if [ -f "$CUR" ] \
             && norm "$CUR" > "${RUNNER_TEMP}/cur.norm" 2>/dev/null \
             && norm "$NEW" > "${RUNNER_TEMP}/new.norm" 2>/dev/null \
             && cmp -s "${RUNNER_TEMP}/cur.norm" "${RUNNER_TEMP}/new.norm"; then
            echo "No substantive change; skipping commit."
            exit 0
          fi
          mkdir -p cdn/v3
          cp "$NEW" "$CUR"
          git config user.name "fummicc1-app[bot]"
          git config user.email "293152319+fummicc1-app[bot]@users.noreply.github.com"
          git add cdn/v3/quizzes.json
          git commit -m "chore: refresh cdn/v3/quizzes.json (automated)"
          git push origin HEAD:main
