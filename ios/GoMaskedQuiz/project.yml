name: GoMaskedQuiz
options:
  bundleIdPrefix: dev.fummicc1
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: S8WBNKMKYU
    CODE_SIGN_STYLE: Automatic
targets:
  GoMaskedQuiz:
    type: application
    platform: iOS
    sources:
      - path: GoMaskedQuiz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.fummicc1.go-masked-quiz
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
  GoMaskedQuizTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GoMaskedQuizTests
    dependencies:
      - target: GoMaskedQuiz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.fummicc1.go-masked-quiz.tests
schemes:
  GoMaskedQuiz:
    build:
      targets:
        GoMaskedQuiz: all
        GoMaskedQuizTests: [test]
    test:
      targets:
        - GoMaskedQuizTests
